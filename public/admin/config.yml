backend:
  name: github
  repo: zifaucode/selam-ilmu
  branch: main

# Aktifkan ini agar bisa testing CMS di localhost tanpa login GitHub dulu
local_backend: true

media_folder: "public/images/uploads"
public_folder: "/images/uploads"

site_url: "https://selamilmu.com"
display_url: "https://selamilmu.com"
logo_url: "/logo.jpg"

collections:
  - name: "philosophy"
    label: "Filsafat"
    folder: "src/content/philosophy"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Judul", name: "title", widget: "string"}
      - {label: "Slug", name: "slug", widget: "string", required: false, hint: "Kosongkan agar terisi otomatis"}
      - {label: "Kategori", name: "category", widget: "hidden", default: "philosophy"}
      - {label: "Tags", name: "tags", widget: "list", required: false}
      - {label: "Ringkasan", name: "summary", widget: "text"}
      - {label: "Penulis", name: "author", widget: "string", default: "Admin"}
      - {label: "Tanggal Dibuat", name: "createdAt", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false}
      - {label: "Gambar", name: "image", widget: "image", required: false}
      - {label: "Artikel Terkait", name: "related", widget: "list", required: false}
      - {label: "Konten", name: "body", widget: "markdown"}

  - name: "spirituality"
    label: "Spiritualitas"
    folder: "src/content/spirituality"
    create: true
    slug: "{{slug}}"
    fields:
